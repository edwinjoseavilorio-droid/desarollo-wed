<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>actividad de bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="css/styles.css" rel="stylesheet">
</head>

<body>
    <!-- navbar-->
  <nav class="navbar navbar-expand-lg bg-danger-subtle text-white">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">mi app</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <!-- MENÚ -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="#">INICIO</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">LOGIN</a>
                </li>
            </ul>

            <!-- BUSCADOR -->
            <form class="d-flex" role="search">
                <input class="form-control me-2" type="search" placeholder="Search">
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>

        </div>
    </div>
</nav>
    <!-- contenido-->
    <div class="container mt-3">

        <!-- CUADRÍCULA + TARJETAS -->
        <div class="row">

            <div class="col-md-6">
                <div class="card">
                    <img src="https://picsum.photos/id/237/800" class="card-img-top" alt="">
                    <div class="card-body">
                        <h5 class="card-title">producto 1 </h5>
                        <p class="card-text">descripcion del producto </p>
                       
                        <a href="#" class="btn btn-primary btn-modal">ver mas</a>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card">
                    <img src="https://picsum.photos/id/738/800" class="card-img-top" alt="...">
                    <div class="card-body">
                        <h5 class="card-title">producto 2</h5>
                        <p class="card-text"> descripcion del producto </p>

                        <a href="#" class="btn btn-primary btn-modal">ver mas</a>
                    </div>
                </div>
            </div>

        </div>

        <!-- FORMULARIO INICIO SESION -->
        <div class="row mt-5" id="LOGIN">
            <div class="col-md-6 mx-auto">
                <h3 class="text-center mb-3">iniciar sesión</h3>
                <div id="mensaje" class="mt-3 text-center"> </div>


                    <form>
                        <div class="mb-3">
                            <label for="exampleInputEmail1" class="form-label">ingrese el gmail </label>
                            <input type="email" class="form-control" id="email"
                                aria-describedby="emailHelp">
                            <div id="emailHelp" class="form-text">Nunca compartiremos tu correo electrónico con nadie
                                más.</div>
                        </div>
                        <div class="mb-3">
                            <label for="exampleInputPassword1" class="form-label">contraseña</label>
                            <input type="password" class="form-control" id="password">
                        </div>
                        <button type="submit" class="btn btn-primary mt-3 mb-3">Submit</button>
                    </form>
            </div>
        </div>
        <div>
            <!-- Modal -->
            <div class="modal fade" id="miModal" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h1 class="modal-title fs-5" id="exampleModalLabel">informacion de producto</h1>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            has hecho clic en "ver más"
                        </div>
                    </div>
                </div>
            </div>

            <script src="js/script.js"></script>

            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                crossorigin="anonymous"></script>
</body>

</html>
