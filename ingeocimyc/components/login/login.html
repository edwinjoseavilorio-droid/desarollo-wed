<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Iniciar Sesión — INGEOCIMYC</title>
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-page {
      max-width: 400px;
      width: 100%;
      margin: 0 20px;
      background: #fff;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <main class="login-page">
    <h1>🔐 Iniciar Sesión</h1>
    
    <form id="login-form" class="login-form">
      <label for="username">
        Usuario
        <input id="username" type="text" required autofocus placeholder="Ingresa tu usuario">
      </label>
      
      <label for="password">
        Contraseña
        <input id="password" type="password" required placeholder="Ingresa tu contraseña">
      </label>
      
      <button class="btn primary" type="submit">Entrar</button>
      
      <div id="error-msg" class="form-error" aria-live="polite"></div>
    </form>

    <p class="login-info">
      <strong>👤 Demo:</strong> admin<br>
      <strong>🔑 Contraseña:</strong> 1234<br>
      <small style="color: #999; margin-top: 10px; display: block;">⚠️ Solo con fines educativos. No es seguro para producción.</small>
    </p>
  </main>

  <script src="../../auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initLoginPage();
    });
  </script>
</body>
</html>
